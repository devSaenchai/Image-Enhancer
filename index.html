<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Image Enhancer</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin:0;
}

h1{
margin-bottom:20px;
}

.upload{
border:2px dashed #22c55e;
padding:30px;
border-radius:12px;
cursor:pointer;
margin-bottom:20px;
}

.container{
display:flex;
flex-direction:column;
gap:20px;
max-width:500px;
margin:auto;
}

.image-box{
background:#1e293b;
padding:10px;
border-radius:10px;
}

img,canvas{
width:100%;
border-radius:8px;
}

button{
padding:14px;
margin:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.enhance{
background:#22c55e;
color:white;
}

.download{
background:#3b82f6;
color:white;
}

</style>

</head>

<body>

<h1>AI Image Enhancer</h1>

<div class="upload" onclick="fileInput.click()">
Tap to Upload Image
<input type="file" id="fileInput" hidden>
</div>

<div class="container">

<div class="image-box">
<h3>Before</h3>
<img id="before">
</div>

<div class="image-box">
<h3>After (4x Upscaled)</h3>
<canvas id="canvas"></canvas>
</div>

</div>

<button class="enhance" onclick="enhance()">Enhance Image</button>

<br>

<button class="download" onclick="download()">Download Enhanced Image</button>

<script>

let img = new Image()

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const before = document.getElementById("before")
const fileInput = document.getElementById("fileInput")

fileInput.onchange = function(e){

const file = e.target.files[0]

if(!file) return

const reader = new FileReader()

reader.onload = function(event){

img.src = event.target.result
before.src = img.src

}

reader.readAsDataURL(file)

}

function enhance(){

if(!img.src){
alert("Upload image first")
return
}

const scale = 4

canvas.width = img.width * scale
canvas.height = img.height * scale

ctx.imageSmoothingEnabled = true
ctx.imageSmoothingQuality = "high"

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(img,0,0,canvas.width,canvas.height)

}

function download(){

const link = document.createElement("a")

link.download = "enhanced-image.png"

link.href = canvas.toDataURL("image/png")

link.click()

}

</script>

</body>
</html>
