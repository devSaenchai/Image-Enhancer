<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Image Enhancer</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin:0;
}

h1{
font-size:30px;
}

.upload{
border:2px dashed #22c55e;
padding:30px;
border-radius:12px;
cursor:pointer;
margin-bottom:20px;
}

.container{
display:flex;
flex-direction:column;
gap:20px;
max-width:500px;
margin:auto;
}

.image-box{
background:#1e293b;
padding:10px;
border-radius:10px;
}

img{
width:100%;
border-radius:8px;
}

button{
padding:14px;
margin:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.enhance{
background:#22c55e;
color:white;
}

.download{
background:#3b82f6;
color:white;
}

canvas{
display:none;
}

</style>

</head>

<body>

<h1>AI Image Enhancer</h1>

<div class="upload" id="uploadBox">
Tap to Upload Image
<input type="file" id="fileInput" hidden>
</div>

<div class="container">

<div class="image-box">
<h3>Before</h3>
<img id="before">
</div>

<div class="image-box">
<h3>After (Enhanced)</h3>
<img id="after">
</div>

</div>

<button class="enhance" onclick="enhance()">Enhance Image 4x</button>

<br>

<button class="download" id="downloadBtn" style="display:none">
Download Enhanced Image
</button>

<canvas id="canvas"></canvas>

<script>

let imageFile;

const uploadBox=document.getElementById("uploadBox");
const fileInput=document.getElementById("fileInput");

uploadBox.onclick=()=>fileInput.click();

fileInput.onchange=(e)=>{
imageFile=e.target.files[0];
preview();
};

function preview(){

let url=URL.createObjectURL(imageFile);
document.getElementById("before").src=url;

}

function enhance(){

if(!imageFile){
alert("Upload an image first");
return;
}

let img=new Image();
img.src=document.getElementById("before").src;

img.onload=function(){

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.width*2;
canvas.height=img.height*2;

ctx.imageSmoothingEnabled=true;
ctx.imageSmoothingQuality="high";

ctx.drawImage(img,0,0,canvas.width,canvas.height);

let enhanced=canvas.toDataURL("image/png");

document.getElementById("after").src=enhanced;

document.getElementById("downloadBtn").style.display="inline-block";

document.getElementById("downloadBtn").onclick=function(){

let a=document.createElement("a");
a.href=enhanced;
a.download="enhanced-image.png";
a.click();

};

};

}

</script>

</body>
</html>
