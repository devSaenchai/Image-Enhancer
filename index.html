<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 4x Image Upscaler</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin:0;
}

h1{
margin-bottom:20px;
}

.upload{
border:2px dashed #22c55e;
padding:30px;
border-radius:12px;
cursor:pointer;
margin-bottom:20px;
}

.container{
display:flex;
flex-direction:column;
gap:20px;
max-width:500px;
margin:auto;
}

.image-box{
background:#1e293b;
padding:10px;
border-radius:10px;
}

img{
width:100%;
border-radius:8px;
}

button{
padding:14px;
margin:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.upscale{
background:#22c55e;
color:white;
}

.download{
background:#3b82f6;
color:white;
}

.loading{
display:none;
margin-top:15px;
}

</style>

</head>

<body>

<h1>AI 4x Image Upscaler</h1>

<div class="upload" id="drop">
Tap or Drag Image Here
<input type="file" id="file" hidden>
</div>

<div class="container">

<div class="image-box">
<h3>Before</h3>
<img id="before">
</div>

<div class="image-box">
<h3>After (4x AI)</h3>
<img id="after">
</div>

</div>

<button class="upscale" onclick="upscale()">Upscale Image 4x</button>

<div class="loading" id="loading">Processing AI Upscale...</div>

<br>

<button class="download" id="download" style="display:none">
Download Upscaled Image
</button>

<script>

let file;

const drop=document.getElementById("drop");
const input=document.getElementById("file");

drop.onclick=()=>input.click();

input.onchange=(e)=>{
file=e.target.files[0];
preview();
};

drop.addEventListener("dragover",(e)=>{e.preventDefault();});

drop.addEventListener("drop",(e)=>{
e.preventDefault();
file=e.dataTransfer.files[0];
preview();
});

function preview(){

let url=URL.createObjectURL(file);
document.getElementById("before").src=url;

}

async function upscale(){

if(!file){
alert("Upload an image first");
return;
}

document.getElementById("loading").style.display="block";

let form=new FormData();
form.append("image",file);

let res=await fetch(
"https://api.deepai.org/api/torch-srgan",
{
method:"POST",
headers:{
"api-key":"c326528d-f944-461e-9994-5a096a1a7b1b"
},
body:form
});

let data=await res.json();

document.getElementById("after").src=data.output_url;

document.getElementById("download").style.display="inline-block";

document.getElementById("download").onclick=function(){

let a=document.createElement("a");
a.href=data.output_url;
a.download="upscaled-4x.png";
a.click();

};

document.getElementById("loading").style.display="none";

}

</script>

</body>
</html>
