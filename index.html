<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Image Enhancer</title>

<script src="https://cdn.jsdelivr.net/npm/upscaler/dist/browser/umd/upscaler.min.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin:0;
}

h1{
font-size:28px;
}

.upload{
border:2px dashed #22c55e;
padding:30px;
border-radius:12px;
cursor:pointer;
margin-bottom:20px;
}

.container{
display:flex;
flex-direction:column;
gap:20px;
max-width:500px;
margin:auto;
}

.image-box{
background:#1e293b;
padding:10px;
border-radius:10px;
}

img{
width:100%;
border-radius:8px;
}

button{
padding:14px;
margin:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.enhance{
background:#22c55e;
color:white;
}

.download{
background:#3b82f6;
color:white;
}

.loading{
display:none;
}

</style>

</head>

<body>

<h1>AI Image Enhancer</h1>

<div class="upload" id="uploadBox">
Tap to Upload Image
<input type="file" id="fileInput" hidden>
</div>

<div class="container">

<div class="image-box">
<h3>Before</h3>
<img id="before">
</div>

<div class="image-box">
<h3>After (AI Upscaled)</h3>
<img id="after">
</div>

</div>

<button class="enhance" onclick="enhance()">Enhance Image</button>

<div class="loading" id="loading">Running AI Model...</div>

<br>

<button class="download" id="downloadBtn" style="display:none">
Download Enhanced Image
</button>

<script>

let imgElement;

const uploadBox=document.getElementById("uploadBox");
const fileInput=document.getElementById("fileInput");

uploadBox.onclick=()=>fileInput.click();

fileInput.onchange=(e)=>{

const file=e.target.files[0];

let url=URL.createObjectURL(file);

imgElement=new Image();
imgElement.src=url;

document.getElementById("before").src=url;

};

async function enhance(){

if(!imgElement){
alert("Upload an image first");
return;
}

document.getElementById("loading").style.display="block";

const upscaler=new Upscaler();

const result=await upscaler.upscale(imgElement);

document.getElementById("after").src=result;

document.getElementById("loading").style.display="none";

document.getElementById("downloadBtn").style.display="inline-block";

document.getElementById("downloadBtn").onclick=function(){

let a=document.createElement("a");
a.href=result;
a.download="enhanced-image.png";
a.click();

};

}

</script>

</body>
</html>
