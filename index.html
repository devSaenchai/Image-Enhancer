<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Image Enhancer</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
font-size:28px;
margin-bottom:20px;
}

.upload{
border:2px dashed #22c55e;
padding:35px;
border-radius:12px;
margin-bottom:20px;
cursor:pointer;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
margin:8px;
font-size:15px;
cursor:pointer;
}

.ai{background:#22c55e;color:white;}
.download{background:#3b82f6;color:white;}

.container{
max-width:420px;
margin:auto;
position:relative;
}

.container img{
width:100%;
border-radius:10px;
}

.after{
position:absolute;
top:0;
left:0;
width:50%;
overflow:hidden;
}

.range{
width:100%;
margin-top:15px;
}

.loading{
display:none;
margin-top:15px;
}

</style>
</head>

<body>

<h1>AI Image Enhancer</h1>

<div class="upload" id="drop">
Tap or Drag Image
<input type="file" id="file" hidden>
</div>

<div class="container" id="preview" style="display:none">

<img id="before">

<div class="after">
<img id="after">
</div>

</div>

<input type="range" min="0" max="100" value="50" id="slider" class="range" style="display:none">

<div>

<button class="ai" onclick="enhance()">AI Enhance</button>
<button class="ai" onclick="denoise()">AI Denoise</button>
<button class="ai" onclick="restore()">Color Restore</button>
<button class="ai" onclick="face()">Face Enhance</button>

</div>

<div class="loading" id="loading">Processing AI...</div>

<br>

<button class="download" id="download" style="display:none">Download</button>

<script>

let file;

const drop=document.getElementById("drop");
const input=document.getElementById("file");

drop.onclick=()=>input.click();

input.onchange=(e)=>{
file=e.target.files[0];
preview();
};

drop.addEventListener("dragover",(e)=>{e.preventDefault();});

drop.addEventListener("drop",(e)=>{
e.preventDefault();
file=e.dataTransfer.files[0];
preview();
});

function preview(){

let url=URL.createObjectURL(file);

document.getElementById("before").src=url;

document.getElementById("preview").style.display="block";
document.getElementById("slider").style.display="block";

}

document.getElementById("slider").oninput=function(){

document.querySelector(".after").style.width=this.value+"%";

}

async function callAI(endpoint){

document.getElementById("loading").style.display="block";

let form=new FormData();
form.append("image",file);

let res=await fetch(
"https://api.deepai.org/api/"+endpoint,
{
method:"POST",
headers:{
"api-key":"c326528d-f944-461e-9994-5a096a1a7b1b"
},
body:form
});

let data=await res.json();

document.getElementById("after").src=data.output_url;

document.getElementById("download").style.display="inline-block";

document.getElementById("download").onclick=function(){

let a=document.createElement("a");
a.href=data.output_url;
a.download="enhanced.png";
a.click();

};

document.getElementById("loading").style.display="none";

}

function enhance(){ callAI("torch-srgan"); }
function denoise(){ callAI("waifu2x"); }
function restore(){ callAI("colorizer"); }
function face(){ callAI("face-enhance"); }

</script>

</body>
</html>
