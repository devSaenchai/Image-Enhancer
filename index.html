<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Image Enhancer</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin:0;
}

h1{
font-size:30px;
margin-bottom:20px;
}

.upload{
border:2px dashed #22c55e;
padding:30px;
border-radius:12px;
cursor:pointer;
margin-bottom:20px;
}

.container{
display:flex;
flex-direction:column;
gap:20px;
max-width:500px;
margin:auto;
}

.image-box{
background:#1e293b;
padding:10px;
border-radius:10px;
}

img,canvas{
width:100%;
border-radius:8px;
}

button{
padding:14px;
margin:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.enhance{
background:#22c55e;
color:white;
}

.download{
background:#3b82f6;
color:white;
}

</style>

</head>

<body>

<h1>AI Image Enhancer</h1>

<div class="upload" onclick="fileInput.click()">
Tap to Upload Image
<input type="file" id="fileInput" hidden>
</div>

<div class="container">

<div class="image-box">
<h3>Before</h3>
<img id="before">
</div>

<div class="image-box">
<h3>After (AI Enhanced)</h3>
<canvas id="canvas"></canvas>
</div>

</div>

<button class="enhance" onclick="enhance()">Run AI Enhance</button>

<br>

<button class="download" onclick="download()">Download Enhanced Image</button>

<script>

let img = new Image()
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

const fileInput=document.getElementById("fileInput")

fileInput.onchange = e => {

let file = e.target.files[0]

let reader = new FileReader()

reader.onload = function(event){

img.src = event.target.result
document.getElementById("before").src = img.src

}

reader.readAsDataURL(file)

}

async function enhance(){

if(!img.src){
alert("Upload image first")
return
}

canvas.width = img.width * 4
canvas.height = img.height * 4

ctx.drawImage(img,0,0,canvas.width,canvas.height)

let tensor = tf.browser.fromPixels(canvas)
tensor = tf.image.resizeBilinear(tensor,[canvas.height,canvas.width])

tensor = tensor.div(255)

let sharpenKernel = tf.tensor4d([

0,-1,0,
-1,5,-1,
0,-1,0

],[3,3,1,1])

let expanded = tensor.expandDims(0)

let enhanced = tf.conv2d(expanded,sharpenKernel,1,'same')

enhanced = enhanced.squeeze().mul(255).clipByValue(0,255)

await tf.browser.toPixels(enhanced,canvas)

}

function download(){

let link=document.createElement("a")
link.download="ai-enhanced.png"
link.href=canvas.toDataURL()
link.click()

}

</script>

</body>
</html>
