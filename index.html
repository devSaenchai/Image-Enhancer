<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Image Enhancer</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin:0;
}

h1{
font-size:30px;
margin-bottom:10px;
}

.tag{
color:#94a3b8;
margin-bottom:25px;
}

.upload{
border:2px dashed #22c55e;
padding:30px;
border-radius:12px;
cursor:pointer;
margin-bottom:20px;
}

.container{
display:flex;
flex-direction:column;
gap:20px;
max-width:500px;
margin:auto;
}

.image-box{
background:#1e293b;
padding:10px;
border-radius:10px;
}

img{
width:100%;
border-radius:8px;
}

button{
padding:14px;
margin:8px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.enhance{
background:#22c55e;
color:white;
}

.download{
background:#3b82f6;
color:white;
}

.loading{
display:none;
margin-top:15px;
}

</style>

</head>

<body>

<h1>AI Image Enhancer</h1>
<p class="tag">Upscale and enhance images with AI</p>

<div class="upload" id="drop">
Tap or Drag Image Here
<input type="file" id="file" hidden>
</div>

<div class="container">

<div class="image-box">
<h3>Before</h3>
<img id="before">
</div>

<div class="image-box">
<h3>After (AI Enhanced)</h3>
<img id="after">
</div>

</div>

<button class="enhance" onclick="enhanceImage()">Enhance Image</button>

<div class="loading" id="loading">Processing AI...</div>

<br>

<button class="download" id="download" style="display:none">
Download Enhanced Image
</button>

<script>

let selectedFile;
let enhancedImageURL="";

const dropArea=document.getElementById("drop");
const fileInput=document.getElementById("file");

dropArea.onclick=()=>fileInput.click();

fileInput.onchange=(e)=>{
selectedFile=e.target.files[0];
previewImage();
};

dropArea.addEventListener("dragover",(e)=>{
e.preventDefault();
});

dropArea.addEventListener("drop",(e)=>{
e.preventDefault();
selectedFile=e.dataTransfer.files[0];
previewImage();
});

function previewImage(){

if(!selectedFile)return;

let imageURL=URL.createObjectURL(selectedFile);

document.getElementById("before").src=imageURL;

}

async function enhanceImage(){

if(!selectedFile){
alert("Please upload an image first.");
return;
}

document.getElementById("loading").style.display="block";

let formData=new FormData();
formData.append("image",selectedFile);

try{

let response=await fetch(
"https://api.deepai.org/api/torch-srgan",
{
method:"POST",
headers:{
"api-key":"c326528d-f944-461e-9994-5a096a1a7b1b"
},
body:formData
});

let text=await response.text();
let data=JSON.parse(text);

console.log(data);

if(data.output_url){

enhancedImageURL=data.output_url;

document.getElementById("after").src=enhancedImageURL;

document.getElementById("download").style.display="inline-block";

}else{

alert("AI Error: "+text);

}

}catch(error){

alert("Connection error: "+error);

}

document.getElementById("loading").style.display="none";

}

document.getElementById("download").onclick=function(){

if(enhancedImageURL){

window.open(enhancedImageURL,"_blank");

}

};

</script>

</body>
</html>
